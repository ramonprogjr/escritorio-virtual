# Render Blueprint — https://render.com/docs/infrastructure-as-code
#
# --- Web service (`escritorio-virtual`) env (mirror `.env.example`; never commit secrets) ---
# Required for this app on Render:
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   NEXT_PUBLIC_APP_URL          — https://<seu-servico>.onrender.com (sem barra final)
#   CRON_SECRET                   — Bearer token for /api/cron/dispatch-ciclos (see lib/cron-auth.ts)
#   MISTRAL_API_KEY               — IA no webhook WhatsApp e briefing
#   UAZAPI_BASE_URL               — ex. https://smartvenda.uazapi.com
#   UAZAPI_ADMIN_TOKEN            — criar instância / sync webhook na ficha do agente
#   WEBHOOK_SECRET                — mesmo valor no header da UAZAPI (x-webhook-secret ou Bearer)
#   DEFAULT_TENANT_ID             — 00000000-0000-4000-8000-000000000001
# Supabase: aplicar migrações (incl. 20260605120000_ensure_hub_leads_crm_tenant.sql) antes do go-live.
# WhatsApp: após deploy, abrir agente → QR/pareamento (sincroniza webhook para NEXT_PUBLIC_APP_URL/api/whatsapp/webhook).
#
# --- Cron Job (`dispatch-ciclos-cron`) ---
# Minimal Docker image (`curl`) runs `scripts/render-dispatch-ciclos.sh` every schedule tick (UTC).
# Inherits CRON_SECRET + NEXT_PUBLIC_APP_URL from the web service via `fromService`.
# Optional override on the cron service (Dashboard): DISPATCH_CICLOS_URL — full URL including
# `/api/cron/dispatch-ciclos` (otherwise NEXT_PUBLIC_APP_URL from the web service is enough).
#
# Limits: Cron Jobs require a paid instance type on Render (not `free`). Blueprint-managed Cron Jobs
# are supported; adjust `region` / service `name` to match your workspace.

services:
  - type: web
    name: escritorio-virtual
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: UAZAPI_BASE_URL
        sync: false
      - key: UAZAPI_ADMIN_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: WEBHOOK_SECRET_HEADER
        value: x-webhook-secret
      - key: DEFAULT_TENANT_ID
        value: "00000000-0000-4000-8000-000000000001"

  - type: cron
    name: dispatch-ciclos-cron
    runtime: docker
    plan: starter
    schedule: "*/5 * * * *"
    dockerfilePath: ./scripts/Dockerfile.dispatch-ciclos-cron
    dockerContext: ./scripts
    dockerCommand: /bin/sh /app/render-dispatch-ciclos.sh
    envVars:
      - key: CRON_SECRET
        fromService:
          type: web
          name: escritorio-virtual
          envVarKey: CRON_SECRET
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          type: web
          name: escritorio-virtual
          envVarKey: NEXT_PUBLIC_APP_URL
